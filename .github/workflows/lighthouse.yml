name: Lighthouse CI (Accessibility + Performance)

on:
  push:
    branches: [dev, staging, main]
  workflow_dispatch:
    inputs:
      force_fail:
        description: "Force this workflow to fail (for testing notifications)"
        required: false
        default: "false"

jobs:
  lighthouse:
    name: Run Lighthouse CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read

    strategy:
      matrix:
        include:
          - branch: dev
            urls: |
              https://dev.oa.report/
              https://dev.oa.report/test/
          - branch: staging
            urls: |
              https://staging.oa.report/
              https://staging.oa.report/test/
          - branch: main
            urls: |
              https://oa.report/
              https://oa.report/test/

    if: ${{ github.ref_name == matrix.branch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Wait for Cloudflare Pages check on this commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.sha;

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            for (let attempt = 1; attempt <= 60; attempt++) {
              const { data } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref,
                per_page: 100,
              });

              const runs = (data.check_runs || []).filter((r) => {
                const name = (r.name || '').toLowerCase();
                return name.includes('cloudflare') && name.includes('pages');
              });

              if (runs.length === 0) {
                core.info(`No Cloudflare Pages checks yet (attempt ${attempt}/60).`);
                await sleep(15000);
                continue;
              }

              runs.sort((a, b) => new Date(b.started_at || 0) - new Date(a.started_at || 0));
              const run = runs[0];
              core.info(`Cloudflare check: ${run.name} status=${run.status} conclusion=${run.conclusion}`);

              if (run.status !== 'completed') {
                await sleep(15000);
                continue;
              }

              if (run.conclusion === 'success') {
                core.info('Cloudflare Pages deployment check is successful.');
                return;
              }

              throw new Error(`Cloudflare Pages check completed with conclusion: ${run.conclusion}`);
            }

            throw new Error('Timed out waiting for Cloudflare Pages deployment check.');

      - name: Wait for branch URLs to be live
        env:
          TARGET_URLS: ${{ matrix.urls }}
        run: |
          set -euo pipefail
          echo "Waiting for branch URLs to return HTTP 200..."

          while IFS= read -r url; do
            [ -z "${url}" ] && continue
            echo "Checking ${url}"

            ok="false"
            for attempt in $(seq 1 40); do
              code="$(curl -sS -o /dev/null -w "%{http_code}" -L "${url}" || true)"
              if [ "${code}" = "200" ]; then
                ok="true"
                echo "  Live (${code})"
                break
              fi
              echo "  Not live yet (HTTP ${code:-000}) retry ${attempt}/40..."
              sleep 15
            done

            if [ "${ok}" != "true" ]; then
              echo "Timed out waiting for ${url} to become live."
              exit 1
            fi
          done <<< "${TARGET_URLS}"

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ matrix.urls }}
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Force failure (notification test)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.force_fail == 'true' }}
        run: |
          echo "Intentionally failing to test email routing to Front."
          exit 1
